<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client 1 - Responsive Personal Portofolio website</title>
    <link rel="stylesheet" href="style.css">
    <!--font awesome cdn link-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="img1.png" alt="Client's logo" width="90px">
            </div>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Service</a></li>
                <li><a href="#">Blog</a></li>
            </ul>
            <button>Contact <i class="fa fa-arrow-right"></i></button>
            <i class="fa fa-bars"></i>
        </div>
        <div class="hero">
            <div class="content">
                <h1>Hey there It's <br> Abdullah Qamardeen</h1>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Soluta, assumen
                    da error dolorem pariatur odit qui eos minima, tempore rem simi
                    lique eveniet reprehenderit illum magni quaerat a ducimus eaque! Deserunt, sapiente.</p>
                <button>Say Hello <i class="fa fa-arrow-right"></i></button>
            </div>
            <div class="hero-image">
                <img src="imgq1.png" alt="Hero-Image">
            </div>
        </div>
    </div>


    <script>
        let menu = document.querySelector("ul");
        let bars = document.querySelector(".header .fa-bars")


        bars.addEventListener("click",function(){
            menu.classList.toggle("show")
        })



    </script>
</body>
</html>
